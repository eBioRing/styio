import lit.formats
import os
import shutil

config.name = "Styio"
config.test_format = lit.formats.ShTest(True)

config.suffixes = [".styio", ".sio"]

# RUN: %{styio} ... — resolve compiler (absolute path when possible).
_repo_root = os.path.dirname(os.path.dirname(os.path.abspath(__file__)))
_candidates = [
    os.environ.get("STYIO_COMPILER_EXE"),
    shutil.which("styio"),
    os.path.join(_repo_root, "styio"),
]
_styio = next(
    (c for c in _candidates if c and os.path.isfile(c) and os.access(c, os.X_OK)),
    None,
)
if _styio is None:
    _styio = "styio"
config.substitutions.append(("%{styio}", _styio))
