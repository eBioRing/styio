id = "add-resource-identifier"
title = "Add Resource Identifier"
purpose = "Add or change a Styio resource identifier without drifting syntax, lifecycle, docs, and tests."
last_updated = "2026-05-04"
doc = "ADD-RESOURCE-IDENTIFIER.md"
skill = "skills/styio-resource-identifier-change/skill.toml"

steps = [
  "add or update the internal Styio resource declaration",
  "record accepted source forms, capability, direction, ownership, lifetime, and close/error behavior",
  "update resource syntax, prelude source, and lifecycle docs",
  "update parser, analyzer, runtime, or config substrate surfaces as needed",
  "add positive and fail-closed tests",
]

required_evidence = [
  "internal Styio resource declaration and accepted source forms",
  "capability and lifetime statement",
  "parser or analyzer coverage",
  "runtime or fail-closed coverage",
  "resource identifier SSOT updated",
]

constraints = [
  "parameterized resource expressions are not declaration heads",
  "do not document or implement @name{arg} := { ... } forms",
  "do not introduce file(path) or other hidden pseudo-primitives",
  "C++ may provide substrate behavior but must not be the resource definition source of truth",
]

gates = [
  "cmake --build build/default --target styio_security_test styio -j2",
  "ctest --test-dir build/default -L security --output-on-failure",
  "python3 scripts/docs-index.py --check",
  "python3 scripts/docs-audit.py",
  "git diff --check",
]

[handoff]
report = [
  "accepted identifiers",
  "internal declaration",
  "reserved identifiers",
  "lifecycle behavior",
  "tests",
  "unsupported paths",
]
