id = "repo-hygiene-commit-standard"
title = "Repo Hygiene Commit Standard"
purpose = "Constrain local cleanup, ignored outputs, pre-commit checks, push checks, and history rewrite boundaries."
last_updated = "2026-04-17"
doc = "REPO-HYGIENE-COMMIT-STANDARD.md"

forbidden = [
  "build directories",
  "test discovery artifacts",
  "binaries",
  "static libraries",
  "temporary logs",
  "profiles",
  "sanitizer and fuzz leftovers",
]

soft_blob_limit = "20MB"
github_hard_blob_limit = "100MB"

commands = [
  "python3 scripts/repo-hygiene-gate.py --mode tracked",
  "python3 scripts/repo-hygiene-gate.py --mode staged",
]
