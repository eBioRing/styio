id = "add-syntax-with-skills"
title = "Add Syntax With Skills"
purpose = "Orchestrate new Styio syntax work through repo-local skills, implementation surfaces, docs, and gates."
last_updated = "2026-04-23"
doc = "ADD-SYNTAX-WITH-SKILLS.md"
skill = "skills/styio-syntax-change/skill.toml"

steps = [
  "load the skill and surface map",
  "freeze accepted examples and reserved symbols",
  "update token enum, token names, and lexer",
  "update IDE tokenizer",
  "update legacy parser",
  "update nightly parser",
  "update AST, type, and IR behavior",
  "update docs and runbooks",
  "add tests and runtime smoke",
  "run gates",
]

implementation_order = [
  "token enum/name/lexer",
  "IDE tokenizer",
  "legacy parser",
  "nightly parser",
  "AST/type/IR behavior",
  "docs and runbooks",
  "tests",
]

required_evidence = [
  "lexer coverage for every new token",
  "legacy and nightly parser coverage for every accepted form",
  "semantic negative coverage for every accepted-but-not-lowered form",
  "runtime smoke for every supported lowering path",
  "compact syntax, EBNF, symbol reference, and semantic SSOT docs updated",
]

gates = [
  "cmake --build build/default --target styio_security_test styio -j2",
  "ctest --test-dir build/default -L security --output-on-failure",
  "ctest --test-dir build/default -R ^StyioParserEngine\\. --output-on-failure",
  "ctest --test-dir build/default -R ^parser_shadow_gate_ --output-on-failure",
  "python3 scripts/docs-index.py --check",
  "python3 scripts/team-docs-gate.py",
  "python3 scripts/docs-audit.py",
  "git diff --check",
]

[failure_policy]
accepted_but_unlowered = "typed fail-closed diagnostic"

[handoff]
report = [
  "accepted syntax",
  "reserved syntax",
  "unsupported lowering paths",
  "docs touched",
  "exact gates run",
  "remaining lifecycle or runtime work",
]
