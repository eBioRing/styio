[skill]
name = "styio-resource-identifier-change"
display_name = "Styio Resource Identifier Change"
description = "Use when adding or changing `@name` resource identifiers, built-in resource symbols, capabilities, lifetimes, or resource syntax docs/tests."
last_updated = "2026-05-04"

workflow = [
  "add or update the internal Styio resource declaration",
  "check references/resource-identifier-surface.md",
  "record accepted source forms, capability, direction, ownership, lifetime, close, and error behavior",
  "update syntax, prelude source, and lifecycle docs before implementation details drift",
  "add parser/analyzer/runtime coverage or typed fail-closed coverage",
  "run gates from workflows/ADD-RESOURCE-IDENTIFIER.toml",
]

constraints = [
  "do not introduce an identifier without lifecycle semantics",
  "do not document or implement parameterized resource expressions as @name{arg} := { ... } declarations",
  "do not introduce file(path) or other hidden pseudo-primitives",
  "C++ may provide substrate behavior but must not be the resource definition source of truth",
  "prefer fail-closed diagnostics over partially lowered resources",
  "keep resource prelude declarations compact and machine-readable",
]

completion_report = [
  "internal declaration",
  "accepted source forms",
  "lifecycle behavior",
  "docs updated",
  "tests and gates run",
]

references = [
  "references/resource-identifier-surface.md",
]
