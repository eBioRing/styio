name: styio-nightly-fuzz

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  nightly-fuzz:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-18 \
            libclang-rt-18-dev \
            lld-18 \
            llvm-18-dev \
            libicu-dev \
            python3

      - name: Configure
        run: >
          cmake -S . -B build/fuzz -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang-18
          -DCMAKE_CXX_COMPILER=clang++-18
          -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm
          -DSTYIO_ENABLE_FUZZ=ON

      - name: Build fuzzers
        run: cmake --build build/fuzz --target styio_fuzz_lexer styio_fuzz_parser

      - name: Verify fuzz binaries
        run: |
          test -x ./build/fuzz/bin/styio_fuzz_lexer
          test -x ./build/fuzz/bin/styio_fuzz_parser

      - name: Run deep fuzz
        id: deep_fuzz
        run: |
          mkdir -p fuzz-artifacts/lexer fuzz-artifacts/parser
          set +e
          ASAN_OPTIONS=detect_container_overflow=0 ./build/fuzz/bin/styio_fuzz_lexer \
            tests/fuzz/corpus/lexer \
            -max_total_time=600 \
            -artifact_prefix=fuzz-artifacts/lexer/ \
            > fuzz-artifacts/lexer.log 2>&1
          LEX_EXIT=$?

          ASAN_OPTIONS=detect_container_overflow=0 ./build/fuzz/bin/styio_fuzz_parser \
            tests/fuzz/corpus/parser \
            -max_total_time=600 \
            -artifact_prefix=fuzz-artifacts/parser/ \
            > fuzz-artifacts/parser.log 2>&1
          PARSER_EXIT=$?
          set -e

          echo "lexer_exit=$LEX_EXIT" >> "$GITHUB_OUTPUT"
          echo "parser_exit=$PARSER_EXIT" >> "$GITHUB_OUTPUT"
          printf '{"lexer":%s,"parser":%s}\n' "$LEX_EXIT" "$PARSER_EXIT" \
            > fuzz-artifacts/exit-codes.json

      - name: Build regression case pack
        if: always()
        run: |
          ./scripts/fuzz-regression-pack.sh \
            --artifacts-root ./fuzz-artifacts \
            --out-dir ./fuzz-regressions \
            --run-id "gh-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-fuzz-artifacts
          path: fuzz-artifacts/
          if-no-files-found: ignore

      - name: Upload fuzz regression packs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-fuzz-regressions
          path: fuzz-regressions/
          if-no-files-found: ignore

      - name: Fail job on fuzz crash
        if: always()
        run: |
          LEX_EXIT="${{ steps.deep_fuzz.outputs.lexer_exit }}"
          PARSER_EXIT="${{ steps.deep_fuzz.outputs.parser_exit }}"

          if [ -z "$LEX_EXIT" ] || [ -z "$PARSER_EXIT" ]; then
            echo "Deep fuzz did not produce exit codes."
            exit 1
          fi

          if [ "$LEX_EXIT" -ne 0 ] || [ "$PARSER_EXIT" -ne 0 ]; then
            echo "Fuzz target failed: lexer=$LEX_EXIT parser=$PARSER_EXIT"
            exit 1
          fi
