name: styio-ci-gate

on:
  pull_request:
  push:
    branches:
      - ai-dev
      - nightly
      - stable
      - main
      - master
      - agent-dev

jobs:
  styio-ci-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          path: styio-nightly

      - name: Resolve ecosystem lane
        id: lane
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_LANE="${{ github.base_ref }}"
          else
            TARGET_LANE="${{ github.ref_name }}"
          fi

          case "$TARGET_LANE" in
            ai-dev|nightly|stable|main)
              ECOSYSTEM_REF="nightly"
              ;;
            *)
              ECOSYSTEM_REF="nightly"
              ;;
          esac

          echo "target_lane=$TARGET_LANE" >> "$GITHUB_OUTPUT"
          echo "ecosystem_ref=$ECOSYSTEM_REF" >> "$GITHUB_OUTPUT"

      - name: Check out styio-spio sibling repository
        uses: actions/checkout@v5
        with:
          repository: Unka-Malloc/styio-spio
          ref: ${{ steps.lane.outputs.ecosystem_ref }}
          path: styio-spio

      - name: Check out styio-view sibling repository
        uses: actions/checkout@v5
        with:
          repository: Unka-Malloc/styio-view
          ref: ${{ steps.lane.outputs.ecosystem_ref }}
          path: styio-view

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.5"

      - name: Run workflow scheduler prebuild chain
        shell: bash
        working-directory: styio-nightly
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 scripts/workflow-scheduler.py run --profile ci-prebuild

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-18 \
            libclang-rt-18-dev \
            lld-18 \
            llvm-18-dev \
            libicu-dev \
            python3

      - name: Configure
        working-directory: styio-nightly
        run: >
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang-18
          -DCMAKE_CXX_COMPILER=clang++-18
          -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm
          -DSTYIO_ENABLE_FUZZ=ON

      - name: Build
        working-directory: styio-nightly
        run: >
          cmake --build build/ci --target
          styio styio_test styio_algorithm_equivalence_test
          styio_security_test styio_resource_topology_test styio_ide_test
          styio_soak_test styio_fuzz_suite

      - name: Docs audit
        working-directory: styio-nightly
        run: ctest --test-dir build/ci -L docs --output-on-failure

      - name: Security tests
        working-directory: styio-nightly
        run: ctest --test-dir build/ci -L security --output-on-failure

      - name: Five-layer pipeline tests
        working-directory: styio-nightly
        run: ctest --test-dir build/ci -L styio_pipeline --output-on-failure

      - name: Parser shadow gate (M1 full suite + artifacts)
        working-directory: styio-nightly
        run: |
          mkdir -p build/ci/parser-shadow-artifacts
          ./benchmark/parser-shadow-suite-gate.sh ./build/ci/bin/styio ./tests/milestones/m1 ./build/ci/parser-shadow-artifacts

      - name: Parser shadow gate (M2 full suite + artifacts)
        working-directory: styio-nightly
        run: |
          mkdir -p build/ci/parser-shadow-artifacts-m2
          ./benchmark/parser-shadow-suite-gate.sh ./build/ci/bin/styio ./tests/milestones/m2 ./build/ci/parser-shadow-artifacts-m2

      - name: Upload parser shadow artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: parser-shadow-artifacts
          path: |
            styio-nightly/build/ci/parser-shadow-artifacts
            styio-nightly/build/ci/parser-shadow-artifacts-m2
          if-no-files-found: ignore

      - name: Soak smoke tests
        working-directory: styio-nightly
        run: ctest --test-dir build/ci -L soak_smoke --output-on-failure

      - name: Milestone smoke
        working-directory: styio-nightly
        run: ctest --test-dir build/ci -R '^m1_t01_int_arith$|^m2_t01_simple_func$' --output-on-failure

      - name: Fuzz smoke
        working-directory: styio-nightly
        run: ctest --test-dir build/ci -L fuzz_smoke --output-on-failure
